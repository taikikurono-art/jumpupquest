name: Update SW Cache Version
 
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'sw.js'  # sw.js自身の更新による無限ループを防止
 
jobs:
  update-cache-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Update CACHE_NAME with timestamp
        run: |
          TIMESTAMP=$(TZ='Asia/Tokyo' date '+%Y%m%d-%H%M')
          sed -i "s/const CACHE_NAME = 'jumpupquest-[^']*'/const CACHE_NAME = 'jumpupquest-${TIMESTAMP}'/" sw.js
          echo "Updated CACHE_NAME to jumpupquest-${TIMESTAMP}"
 
      - name: Commit updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: update SW cache version [skip ci]"
          git push
 
